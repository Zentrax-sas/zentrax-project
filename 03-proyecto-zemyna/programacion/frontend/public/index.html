<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/logo.jpeg" type="image/jpeg">
    <title>Zemyna | Inicio</title>
    <link rel="stylesheet" href="../src/styles/index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <header class="navbar">
        <div class="brand">
            <img src="assets/logo_sin_fondo2.png" alt="Zemyna" style="height: 50px; width: auto;">
        </div>
        <a href="landing.html" class="btn-login" style="margin: 0;">← Volver a la Landing</a>
    </header>

    <section class="hero">
        <h2>Reporte Ciudadano - Municipio</h2>
        <p>Hacé clic en un contenedor del mapa para ver su estado y registrar una incidencia en la demo.</p>
    </section>

    <main class="main-container">
        <div class="map-wrapper">
            <div id="mapa-vedette"></div>
        </div>

        <div class="form-wrapper" id="panel-formulario">
            <h3>Nueva Incidencia</h3>
            <div id="form-msg-vacio" class="form-placeholder">
                <p>Seleccioná un contenedor del mapa para habilitar el formulario de reportes.</p>
            </div>

            <form id="form-reporte" class="form-active">
                <label for="form-id-contenedor">ID Contenedor:</label>
                <input type="text" id="form-id-contenedor" name="id_contenedor" readonly>

                <label for="form-direccion">Ubicación / Esquina:</label>
                <input type="text" id="form-direccion" name="direccion" readonly>

                <label for="tipo_incidencia">¿Cuál es el problema?</label>
                <select id="tipo_incidencia" name="tipo_incidencia" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="desborde">Contenedor Desbordado</option>
                    <option value="roto">Contenedor Roto / Dañado</option>
                    <option value="obstruido">Obstruido por Vehículo</option>
                    <option value="fuego">Incendio / Vandalismo</option>
                </select>

                <div id="captcha-wrapper" style="display: none; margin: 14px 0 10px;">
                    <label for="captcha_respuesta">Captcha de seguridad</label>
                    <div id="captcha-question" style="font-weight: 700; color: #1f2937; margin: 6px 0;">Cargando pregunta...</div>
                    <input type="number" id="captcha_respuesta" name="captcha_respuesta" placeholder="Ingrese la respuesta" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; box-sizing: border-box;" required>
                    <button type="button" id="refresh-captcha" style="margin-top: 8px; width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #d1d5db; background: #f9fafb; cursor: pointer;">Actualizar pregunta</button>
                </div>

                <p id="reporte-message" role="status" style="margin-top: 10px; color: #1f2937; font-size: 0.95rem;"></p>
                <button type="submit" class="submit-button">ENVIAR REPORTE</button>
            </form>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="mapa.js"></script>
</body>
</html>
