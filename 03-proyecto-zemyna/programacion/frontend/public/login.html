<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/logo.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="../src/styles/login.css">
    <style>
        .captcha-row {
            margin: 20px 0;
        }
        .captcha-row label {
            display: block;
            margin-bottom: 8px;
            color: #eeeeee;
            font-weight: 600;
        }
        .captcha-question {
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }
        .captcha-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111111;
            color: #ffffff;
            margin-bottom: 10px;
        }
        .captcha-refresh {
            display: inline-block;
            background: transparent;
            border: 1px solid #22c55e;
            color: #22c55e;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 6px;
        }
        .captcha-refresh:hover {
            background: rgba(34, 197, 94, 0.12);
        }
    </style>
    <title>Login | Zemyna</title>
</head>
<body>
    <div class="login-container">
        <div class="login-visual">
            <img src="assets/logo_sin_fondo2.png" alt="Logo Zemyna" class="logo-hero">
            <h1 style="font-size: 24px; font-weight: 600; margin: 15px 0 10px; line-height: 1.4; max-width: 280px; color: #ffffff;">Sistema de Gestión de Residuos Urbanos</h1>
            <p style="font-size: 13px; color: #888888; margin: 8px 0 0; font-weight: 400;">Montevideo en tiempo real.</p>
        </div>
        <div class="login-form">
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="usuario@zemyna.com" required>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
                <button type="submit" class="login-button">ENTRAR</button>
                <p id="login-message" role="status"></p>
            </form>
        </div>
    </div>

    <script>
    const APP_BASE_URL = 'http://localhost/zentrax-project/03-proyecto-zemyna/programacion/frontend/public';

    if (window.location.protocol === 'file:') {
        window.location.replace(`${APP_BASE_URL}/login.html`);
    }

    function buildApiUrl(path) {
        const normalizedPath = path.startsWith('/') ? path : `/${path}`;
        const separator = normalizedPath.includes('?') ? '&' : '?';
        return `http://localhost/zentrax-project/03-proyecto-zemyna/programacion${normalizedPath}${separator}t=${Date.now()}`;
    }

    function buildFrontendUrl(page) {
        return `${APP_BASE_URL}/${page}`;
    }

    document.getElementById('login-form').addEventListener('submit', async function (event) {
        event.preventDefault();
        const message = document.getElementById('login-message');
        message.textContent = 'Iniciando sesión...';

        try {
            const response = await fetch(buildApiUrl('/backend/api/login.php'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });

            const json = await response.json();
            if (!response.ok || !json.success) {
                if (response.status === 401) {
                    throw new Error('Credenciales inválidas. Prueba con facu@zemyna.com y contraseña 123456.');
                }
                throw new Error(json.message || 'Error al iniciar sesión');
            }

            message.textContent = 'Sesión iniciada correctamente.';
            const rol = json.data?.rol ?? null;
            if (rol === 1 || json.data?.email === 'facu@zemyna.com') {
                window.location.href = buildFrontendUrl('admin.html');
            } else {
                window.location.href = buildFrontendUrl('landing.html');
            }
        } catch (error) {
            if (error instanceof TypeError && error.message.toLowerCase().includes('fetch')) {
                message.textContent = 'No se pudo conectar con el backend. Verifica Apache en XAMPP y abre la app con http://localhost, no con file://.';
            } else {
                message.textContent = error.message;
            }
        }
    });
    </script>
</body>
</html>
